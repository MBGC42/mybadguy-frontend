<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="MyBadGuy device detection — see yourself through the eyes of threat actors.">
  <meta name="theme-color" content="#0f172a">
  <meta name="robots" content="noindex">
  <title>MyBadGuy — Start your detection</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230f172a'/%3E%3Cpath d='M20,50 Q35,28 50,28 L50,72 Q35,72 20,50 Z' fill='%2322d3ee'/%3E%3Cpath d='M50,28 Q65,28 80,50 Q65,72 50,72 Z' fill='none' stroke='%23f1f5f9' stroke-width='2.5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23f1f5f9'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%2322d3ee'/%3E%3C/svg%3E">
  <style>
:root {
      --navy:  #0f172a;
      --mid:   #1a2744;
      --lift:  #1e2d4a;
      --cyan:  #22d3ee;
      --lcyan: #e0f9fd;
      --slate: #f1f5f9;
      --muted: #94a3b8;
      --dim:   #475569;
      --red:   #E24B4A;
      --amber: #EF9F27;
      --blue:  #378ADD;
      --green: #22c55e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--navy);
      color: var(--slate);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .85rem 1.5rem;
      border-bottom: 1px solid rgba(34,211,238,.1);
      background: rgba(15,23,42,.95);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .hdr-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .hdr-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--slate);
    }
    .hdr-steps { display: flex; gap: 5px; align-items: center; }
    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: background .3s;
    }
    .step-dot.active { background: var(--cyan); }
    .step-dot.done   { background: rgba(34,211,238,.4); }

    /* ── MAIN AREA ── */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      min-height: 0;
    }
    .screen {
      width: 100%;
      max-width: 520px;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCAN ANIMATION ── */
    .scan-eye-wrap {
      position: relative;
      width: 200px;
      height: 120px;
      margin: 0 auto 2rem;
    }
    .scan-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scanDown 1.8s ease-in-out infinite;
    }
    @keyframes scanDown {
      0%   { top: 0;    opacity: .8; }
      100% { top: 100%; opacity: 0; }
    }
    .scan-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid var(--cyan);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .scan-ring-1 { width: 230px; height: 138px; animation: ringPulse 2s ease-out infinite; }
    .scan-ring-2 { width: 270px; height: 162px; animation: ringPulse 2s ease-out infinite .5s; }
    @keyframes ringPulse {
      0%   { opacity: .3; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0;  transform: translate(-50%, -50%) scale(1.1); }
    }
    .scan-status-wrap {
      display: grid;
      min-height: 18px;
      margin-top: .5rem;
    }
    .scan-status {
      grid-area: 1 / 1;
      text-align: center;
      font-size: 12px;
      color: var(--cyan);
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: opacity .3s ease;
    }

    /* ── DEVICE CARD ── */
    .device-card {
      background: var(--lift);
      border: 1px solid rgba(34,211,238,.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .device-icon-wrap {
      width: 68px; height: 68px;
      border-radius: 14px;
      background: rgba(34,211,238,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 30px;
      line-height: 1;
    }
    .device-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: .25rem;
    }
    .device-meta { font-size: 14px; color: var(--muted); margin-bottom: .85rem; }
    .patch-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .patch-warn {
      margin-top: .9rem;
      font-size: 12px;
      color: var(--muted);
      background: rgba(226,75,74,.07);
      border-radius: 8px;
      padding: .6rem .85rem;
      line-height: 1.55;
      text-align: left;
    }

    /* ── DEVICE CORRECTION ── */
    .dtype-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .dtype-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: .85rem .4rem;
      border-radius: 12px;
      background: var(--lcyan);
      color: var(--navy);
      border: 1.5px solid rgba(34,211,238,.35);
      cursor: pointer;
      transition: all .15s;
      font-size: 11px;
      font-weight: 600;
    }
    .dtype-card:hover { background: #c8f5fb; border-color: var(--cyan); }
    .dtype-card.sel   { background: var(--cyan); border-color: var(--cyan); }
    .dtype-card .di   { font-size: 22px; line-height: 1; }

    .ver-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
      margin-bottom: 1.25rem;
      padding-right: 2px;
    }
    .ver-card {
      padding: .7rem .9rem;
      border-radius: 10px;
      background: var(--lcyan);
      border: 1.5px solid rgba(34,211,238,.35);
      cursor: pointer;
      transition: all .15s;
      text-align: left;
    }
    .ver-card:hover { background: #c8f5fb; border-color: var(--cyan); }
    .ver-card.sel   { background: var(--cyan); border-color: var(--cyan); }
    .ver-label { font-size: 13px; font-weight: 600; color: var(--navy); display: block; margin-bottom: 1px; }
    .ver-note  { font-size: 10px; display: block; margin-bottom: 1px; }
    .ver-date  { font-size: 10px; color: #475569; display: block; font-style: italic; }
    .ver-card.sel .ver-note,
    .ver-card.sel .ver-date { color: rgba(15,23,42,.6); }

    /* ── PROFILE QUESTIONS ── */
    .q-progress {
      height: 3px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .q-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--cyan);
      transition: width .4s ease;
    }
    .q-block { margin-bottom: 1.75rem; }
    .q-label {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--slate);
      margin-bottom: .85rem;
      line-height: 1.35;
    }
    .q-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .q-pill {
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 99px;
      background: var(--lcyan);
      color: var(--navy);
      border: 1.5px solid rgba(34,211,238,.35);
      cursor: pointer;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .q-pill:hover { background: #c8f5fb; border-color: var(--cyan); }
    .q-pill.sel   { background: var(--cyan); border-color: var(--cyan); font-weight: 700; }
    .age-row { display: flex; align-items: center; gap: 12px; }
    .age-row input[type=range] { flex: 1; accent-color: var(--cyan); }
    .age-val {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--cyan);
      min-width: 36px;
      text-align: right;
    }
    .age-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--dim);
      margin-top: 4px;
    }

    /* ── CALCULATING ── */
    .calc-ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 2px solid rgba(34,211,238,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 0 auto 1.5rem;
    }
    .calc-ring::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      border-top-color: transparent;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS ── */
    .score-hero {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--lift);
      border-radius: 16px;
      padding: 1.4rem;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(255,255,255,.06);
    }
    .score-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 3px solid;
    }
    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
    }
    .score-of { font-size: 10px; opacity: .6; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .score-detail h2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: .3rem; }
    .score-detail p  { font-size: 13px; color: var(--muted); line-height: 1.55; }

    .actor-list {
      background: var(--lift);
      border-radius: 12px;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,.05);
      margin-bottom: 1.25rem;
    }
    .actor-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .45rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .actor-row:last-child { border-bottom: none; }
    .actor-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .actor-name { font-size: 13px; width: 160px; flex-shrink: 0; }
    .actor-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
    .actor-bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .actor-score { font-size: 13px; font-weight: 500; min-width: 28px; text-align: right; }

    .wins-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: .65rem;
    }
    .win-card {
      background: var(--lift);
      border-radius: 10px;
      padding: .85rem 1rem;
      margin-bottom: 7px;
      display: flex;
      gap: 10px;
      border: 1px solid rgba(255,255,255,.05);
    }
    .win-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(34,211,238,.15);
      color: var(--cyan);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .win-title  { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .win-where  { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 5px; }
    .win-chips  { display: flex; gap: 4px; flex-wrap: wrap; }
    .win-chip   { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }

    /* ── SAVE ── */
    .save-card {
      background: var(--lift);
      border: 1px solid rgba(34,211,238,.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .save-id-display {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: var(--cyan);
      background: rgba(34,211,238,.07);
      border: 1px solid rgba(34,211,238,.18);
      border-radius: 10px;
      padding: .85rem 1.25rem;
      margin: 1rem 0;
      word-break: break-word;
      letter-spacing: .03em;
      line-height: 1.7;
    }
    .pin-row { display: flex; gap: 8px; justify-content: center; margin: .65rem 0 1rem; }
    .pin-box {
      width: 44px; height: 52px;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.15);
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--slate);
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    .pin-box:focus { border-color: var(--cyan); }

    /* ── BUTTONS ── */
    .btn-primary {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 32px;
      border-radius: 99px;
      background: var(--lcyan);
      color: var(--navy);
      border: none;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      transition: background .15s, transform .15s;
    }
    .btn-primary:hover   { background: #c8f5fb; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .3; cursor: default; transform: none; }

    .btn-outline {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 99px;
      background: #ffffff;
      color: var(--navy);
      border: 1.5px solid var(--cyan);
      cursor: pointer;
      outline: none;
      transition: background .15s, transform .15s;
    }
    .btn-outline:hover { background: var(--lcyan); transform: translateY(-1px); }

    .btn-ghost {
      font-size: 13px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 14px;
      outline: none;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--slate); }

    .btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    /* ── UTILITIES ── */
    .eyebrow {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: .6rem;
    }
    .sec-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: .3rem;
    }
    .info-box {
      background: rgba(34,211,238,.05);
      border: 1px solid rgba(34,211,238,.14);
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: left;
      margin-bottom: 1.25rem;
    }
    .error-msg {
      background: rgba(226,75,74,.1);
      border: 1px solid rgba(226,75,74,.25);
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: 12px;
      color: var(--red);
      margin-top: .75rem;
      display: none;
    }

    /* scrollbar for version grid */
    .ver-grid::-webkit-scrollbar { width: 4px; }
    .ver-grid::-webkit-scrollbar-track { background: transparent; }
    .ver-grid::-webkit-scrollbar-thumb { background: rgba(34,211,238,.2); border-radius: 2px; }

    @media (max-width: 480px) {
      .dtype-grid { grid-template-columns: repeat(3, 1fr); }
      .ver-grid   { grid-template-columns: 1fr; }
      .actor-name { width: 120px; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <a href="/" class="hdr-brand" aria-label="MyBadGuy home">
    <svg width="26" height="16" viewBox="0 0 100 60" aria-hidden="true">
      <path d="M3,30 Q22,4 50,4 L50,56 Q22,56 3,30 Z" fill="#22d3ee"/>
      <path d="M50,4 Q78,4 97,30 Q78,56 50,56 Z" fill="none" stroke="#f1f5f9" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="50" cy="30" r="7" fill="#f1f5f9"/>
      <circle cx="50" cy="30" r="2.5" fill="#22d3ee"/>
    </svg>
    <span class="hdr-name">MyBadGuy</span>
  </a>
  <div class="hdr-steps" id="stepDots" aria-label="Scan progress" role="progressbar" aria-valuemin="0" aria-valuemax="6"></div>
</header>

<main id="app" role="main"></main>

<script src="/js/detect.js"></script>

</body>
</html>
