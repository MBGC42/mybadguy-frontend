<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="MyBadGuy threat dashboard — your personal risk profile across 7 threat actor types.">
  <meta name="theme-color" content="#0f172a">
  <meta name="robots" content="noindex">
  <title>MyBadGuy — Threat Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230f172a'/%3E%3Cpath d='M20,50 Q35,28 50,28 L50,72 Q35,72 20,50 Z' fill='%2322d3ee'/%3E%3Cpath d='M50,28 Q65,28 80,50 Q65,72 50,72 Z' fill='none' stroke='%23f1f5f9' stroke-width='2.5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23f1f5f9'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%2322d3ee'/%3E%3C/svg%3E">
  <style>
    :root{
      --navy:#0f172a;--mid:#1a2744;--lift:#1e2d4a;
      --cyan:#22d3ee;--lcyan:#e0f9fd;
      --slate:#f1f5f9;--muted:#94a3b8;--dim:#475569;
      --red:#E24B4A;--amber:#EF9F27;--blue:#378ADD;--green:#22c55e;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--navy);color:var(--slate);min-height:100vh;}

    /* NAV */
    .nav{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid rgba(34,211,238,.1);background:rgba(15,23,42,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
    .nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .nav-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--slate);}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .btn-back{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:6px 12px;border-radius:99px;transition:color .15s;text-decoration:none;}
    .btn-back:hover{color:var(--slate);}
    .btn-rescan{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:7px 18px;border-radius:99px;background:var(--lcyan);color:var(--navy);border:none;cursor:pointer;transition:background .15s;text-decoration:none;display:inline-block;}
    .btn-rescan:hover{background:#c8f5fb;}

    /* LAYOUT */
    .page{max-width:760px;margin:0 auto;padding:1.5rem 1.25rem 3rem;}
    .eyebrow{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:.5rem;}
    .sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:.3rem;}

    /* OVERALL SCORE HERO */
    .score-hero{background:var(--lift);border:.5px solid rgba(255,255,255,.07);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.5rem;}
    .score-ring{width:88px;height:88px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
    .score-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;line-height:1;}
    .score-of{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

    /* PROFILE CARD */
    .profile-card{background:var(--lift);border:.5px solid rgba(255,255,255,.07);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;}
    .profile-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
    .profile-title-sub{font-size:11px;color:var(--muted);font-weight:400;}
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;}
    .sl-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
    .sl-label{font-size:12px;color:var(--muted);width:115px;flex-shrink:0;}
    .sl-row input[type=range]{flex:1;accent-color:var(--cyan);}
    .sl-chip{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap;flex-shrink:0;min-width:60px;text-align:center;}
    .sl-sub{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);grid-column:1/-1;margin-top:4px;}
    .profile-divider{grid-column:1/-1;height:.5px;background:rgba(255,255,255,.06);margin:4px 0;}
    .dev-section{border-top:.5px solid rgba(255,255,255,.06);margin-top:.85rem;padding-top:.85rem;}
    .dev-section-title{font-size:11px;font-weight:500;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;}
    .dev-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
    .dev-cb{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;font-weight:500;min-width:76px;}
    .dev-ver{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap;flex-shrink:0;}
    .dev-patch{font-size:11px;padding:2px 7px;border-radius:99px;white-space:nowrap;flex-shrink:0;}

    /* ACTOR GROUP */
    .group-block{margin-bottom:1.5rem;}
    .group-hdr{display:flex;align-items:center;gap:10px;padding:.5rem .85rem;border-radius:8px;border-left:3px solid;margin-bottom:.65rem;}
    .group-hdr-label{font-size:13px;font-weight:500;flex:1;}
    .group-hdr-avg{font-size:11px;opacity:.65;}

    /* ACTOR ROWS */
    .actor-row{background:var(--lift);border:.5px solid rgba(255,255,255,.07);border-radius:12px;padding:.9rem 1rem;margin-bottom:8px;display:flex;align-items:center;gap:12px;text-decoration:none;transition:border-color .15s,transform .15s;}
    .actor-row:hover{border-color:rgba(255,255,255,.2);transform:translateY(-1px);}
    .actor-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
    .actor-info{flex:1;min-width:0;}
    .actor-name{font-size:14px;font-weight:500;color:var(--slate);margin-bottom:2px;}
    .actor-sub{font-size:11px;color:var(--muted);}
    .actor-bars{flex:1;display:flex;flex-direction:column;gap:3px;}
    .bar-line{display:flex;align-items:center;gap:6px;}
    .bar-label{font-size:10px;color:var(--muted);width:50px;flex-shrink:0;}
    .bar-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:2px;transition:width .4s ease;}
    .bar-val{font-size:11px;font-weight:500;min-width:22px;text-align:right;}
    .actor-combo{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
    .combo-score{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1;}
    .combo-label{font-size:10px;color:var(--muted);}
    .actor-arrow{font-size:14px;color:var(--dim);flex-shrink:0;}

    /* QUICK WINS */
    .wins-card{background:var(--lift);border:.5px solid rgba(255,255,255,.07);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;}
    .win-row{display:flex;gap:10px;padding:.5rem 0;border-bottom:.5px solid rgba(255,255,255,.04);}
    .win-row:last-child{border-bottom:none;}
    .win-num{width:22px;height:22px;border-radius:50%;background:rgba(34,211,238,.15);color:var(--cyan);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .win-title{font-size:13px;font-weight:500;margin-bottom:2px;}
    .win-where{font-size:11px;color:var(--muted);font-style:italic;}

    /* NVD ATTRIBUTION */
    .attribution{text-align:center;font-size:10px;color:var(--dim);padding:.75rem;border-top:1px solid rgba(255,255,255,.04);margin-top:1.5rem;}

    @media(max-width:580px){
      .profile-grid{grid-template-columns:1fr;}
      .score-hero{flex-direction:column;text-align:center;}
      .actor-bars{display:none;}
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <svg width="26" height="16" viewBox="0 0 100 60" aria-hidden="true">
      <path d="M3,30 Q22,4 50,4 L50,56 Q22,56 3,30 Z" fill="#22d3ee"/>
      <path d="M50,4 Q78,4 97,30 Q78,56 50,56 Z" fill="none" stroke="#f1f5f9" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="50" cy="30" r="7" fill="#f1f5f9"/>
      <circle cx="50" cy="30" r="2.5" fill="#22d3ee"/>
    </svg>
    <span class="nav-name">MyBadGuy</span>
  </a>
  <div class="nav-right">
    <a href="detect.html" class="btn-back">← Back to detection</a>
    <a href="detect.html" class="btn-rescan">New detection →</a>
  </div>
</nav>

<div class="page" id="page"></div>

<script src="/js/dashboard.js"></script>
</body>
</html>
