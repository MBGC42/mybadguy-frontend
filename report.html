<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Your full risk report — MyBadGuy">
  <meta name="theme-color" content="#003F72">
  <title>MyBadGuy — Full Risk Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/optiona.css">
  <link rel="stylesheet" href="/css/actor.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23003F72'/%3E%3Cpath d='M20,50 Q35,28 50,28 L50,72 Q35,72 20,50 Z' fill='%2322d3ee'/%3E%3Cpath d='M50,28 Q65,28 80,50 Q65,72 50,72 Z' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23fff'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%2322d3ee'/%3E%3C/svg%3E">
  <style>
    body { background: #fff; color: #1a1a1a; font-size: 17px; }

    /* NAV */
    .nav { background: #003F72; padding: 0 20px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
    .btn-back { font-size: 14px; color: rgba(255,255,255,.8); text-decoration: none; padding: 7px 14px; border-radius: 99px; }
    .btn-back:hover { color: #fff; text-decoration: none; }

    /* PAGE */
    .page { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .eyebrow { font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #003F72; margin-bottom: .4rem; }

    /* REPORT CARDS */
    .report-card { background: #F0F4F8; border: 1px solid #dde3ea; border-radius: 12px; padding: 1.1rem 1.25rem; margin-bottom: 12px; }
    .report-card-hdr { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: .65rem; }
    .report-card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #1a1a1a; display: block; }
    .report-card-sub { font-size: 13px; color: #666; display: block; margin-top: 2px; }

    /* DEVICE SUMMARY */
    .dev-summary { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: .85rem; padding-bottom: .85rem; border-bottom: 1px solid #dde3ea; }
    .dev-name-badge { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .dev-ver-badge { font-size: 13px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
    .dev-patch-badge { font-size: 13px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }

    /* PROFILE GRID */
    .ro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
    .ro-section { font-size: 12px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: #666; grid-column: 1/-1; margin: 0 0 6px; padding-top: .65rem; }
    .ro-row { display: flex; align-items: baseline; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #dde3ea; gap: 8px; }
    .ro-row:last-of-type { border-bottom: none; }
    .ro-label { font-size: 14px; color: #555; flex-shrink: 0; }
    .ro-val { font-size: 14px; font-weight: 600; color: #1a1a1a; text-align: right; }
    .profile-divider { height: 1px; background: #dde3ea; grid-column: 1/-1; margin: .5rem 0; }

    /* ACTOR CARDS */
    .actor-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .rem-row { display: flex; align-items: flex-start; gap: 10px; padding: .65rem 0; border-bottom: 1px solid #dde3ea; }
    .rem-row:last-child { border-bottom: none; }
    .rem-num { width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; background: rgba(0,63,114,.1); color: #003F72; }
    .rem-source { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: rgba(0,63,114,.07); border: .5px solid rgba(0,63,114,.2); color: #003F72; text-decoration: none; white-space: nowrap; }
    .rem-tactic { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: rgba(196,18,48,.08); border: .5px solid rgba(196,18,48,.2); color: #C41230; text-decoration: none; white-space: nowrap; }
    a.rem-tactic:hover { background: rgba(196,18,48,.15); }
    .rem-pills { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: .5rem; }

    /* LOADING */
    .loading { text-align: center; padding: 3rem 1rem; color: #666; font-size: 16px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #dde3ea; border-top-color: #003F72; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .attribution { text-align: center; font-size: 13px; color: #888; padding: .75rem; border-top: 1px solid #dde3ea; margin-top: 1.5rem; }
    /* CSP-safe group collapse */
    .pri-body { display: none; }
    .pri-body.open { display: block; }
    .pri-chevron { font-size: 16px; color: inherit; transition: transform .2s; display: inline-block; }
    .pri-chevron.open { transform: rotate(90deg); }
    .pri-hdr { cursor: pointer; user-select: none; }
    /* Actor filter */
    .rem-hidden { display: none !important; }
    /* Save button */
    .report-save-btn { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; padding: 10px 22px; border-radius: 99px; background: #003F72; color: #fff; border: none; cursor: pointer; }

    @media (max-width: 560px) { .ro-grid { grid-template-columns: 1fr; } }

    /* ── Disclaimer card — matches detect.js and actor.js format ── */
    .mbg-disclaimer { margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: #FFF3CD; border: 1px solid #f0c070; border-left: 5px solid #EF9F27; border-radius: 10px; }
    .mbg-disclaimer-title { font-size: 15px; font-weight: 700; color: #7a4e00; margin-bottom: 6px; }
    .mbg-disclaimer-body { font-size: 14px; color: #5a3e00; line-height: 1.7; margin: 0; }
    .mbg-disclaimer-body strong { color: #003F72; font-weight: 700; }

    /* ── Font size overrides — bump all small actor.css sizes ── */
    .rem-title        { font-size: 16px !important; font-weight: 600; line-height: 1.4; }
    .rem-expand       { font-size: 14px !important; }
    .rem-body         { font-size: 15px !important; line-height: 1.75; }
    .rem-action-label { font-size: 13px !important; }
    .rem-action       { font-size: 15px !important; }
    .rem-why-label    { font-size: 13px !important; }
    .rem-why          { font-size: 15px !important; }
    .rbadge           { font-size: 13px !important; padding: 3px 10px; }
    .rem-num          { font-size: 13px !important; width: 24px; height: 24px; }
    .pri-title        { font-size: 15px !important; font-weight: 600; }
    .pri-count        { font-size: 14px !important; }
    .actor-hdr-name   { font-size: 18px !important; font-weight: 700; }
    .actor-hdr-sub    { font-size: 15px !important; }
    .score-chip       { font-size: 14px !important; padding: 4px 14px; }
    .report-card-title { font-size: 17px !important; }
    .report-card-sub  { font-size: 14px !important; }
    .rem-pills .rem-tactic,
    .rem-pills .rem-source { font-size: 13px !important; padding: 3px 10px; }

    /* ── Light mode overrides for actor.css ── */
    body { background: #fff !important; }
    .page { background: #fff !important; }
    .eyebrow { color: #003F72 !important; }
    .rem-card { background: #fff !important; border: 1px solid #dde3ea !important; }
    .rem-card:hover { border-color: #003F72 !important; }
    .rem-card-title { color: #1a1a1a !important; }
    .rem-card-sub { color: #555 !important; }
    .rem-expand { color: #666 !important; }
    .rem-body { color: #444 !important; font-size: 15px; line-height: 1.7; background: #fff !important; }
    .rem-num { background: rgba(0,63,114,.1) !important; color: #003F72 !important; }
    .rem-row { border-bottom-color: #dde3ea !important; }
    .pri-hdr-1 { background: #FCEBEB !important; border-left-color: #C41230 !important; }
    .pri-hdr-2 { background: #FFF3CD !important; border-left-color: #7a4e00 !important; }
    .pri-hdr-3 { background: #E6F1FB !important; border-left-color: #003F72 !important; }
    .pri-hdr-1 .pri-title, .pri-hdr-1 .pri-count { color: #C41230 !important; }
    .pri-hdr-2 .pri-title, .pri-hdr-2 .pri-count { color: #7a4e00 !important; }
    .pri-hdr-3 .pri-title, .pri-hdr-3 .pri-count { color: #003F72 !important; }
    .actor-hdr { background: #F0F4F8 !important; border: 1px solid #dde3ea !important; border-left: 4px solid #003F72 !important; }
    .actor-hdr-name { color: #1a1a1a !important; font-size: 17px; }
    .actor-hdr-sub { color: #555 !important; }
    .report-card { background: #F0F4F8 !important; border: 1px solid #dde3ea !important; }
    .report-card-title { color: #1a1a1a !important; }
    .report-card-sub { color: #666 !important; }
    .ro-label { color: #555 !important; font-size: 14px; }
    .ro-val { color: #1a1a1a !important; font-size: 14px; font-weight: 600; }
    .ro-section { color: #666 !important; }
    .ro-row { border-bottom-color: #dde3ea !important; }
    .profile-divider { background: #dde3ea !important; }
    .dev-name-badge { color: #1a1a1a !important; }
    .dev-summary { border-bottom-color: #dde3ea !important; }
    .attribution { color: #888 !important; border-top-color: #dde3ea !important; }
    .spinner { border-color: #dde3ea; border-top-color: #003F72; }
    .loading { color: #666; }
  </style>
</head>
<body>

    <div class="spinner" aria-hidden="true"></div>
    Loading your report...

</div>

<script src="/js/scoring.js"></script>
<script src="/js/save.js"></script>
<script src="/js/report.js"></script>
</body>
</html>
