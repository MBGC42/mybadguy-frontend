<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="MyBadGuy device security scan — see yourself through the eyes of threat actors.">
  <meta name="theme-color" content="#0f172a">
  <meta name="robots" content="noindex">
  <title>MyBadGuy — Start your scan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230f172a'/%3E%3Cpath d='M20,50 Q35,28 50,28 L50,72 Q35,72 20,50 Z' fill='%2322d3ee'/%3E%3Cpath d='M50,28 Q65,28 80,50 Q65,72 50,72 Z' fill='none' stroke='%23f1f5f9' stroke-width='2.5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23f1f5f9'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%2322d3ee'/%3E%3C/svg%3E">

  <style>
    :root {
      --navy:  #0f172a;
      --mid:   #1a2744;
      --lift:  #1e2d4a;
      --cyan:  #22d3ee;
      --lcyan: #e0f9fd;
      --slate: #f1f5f9;
      --muted: #94a3b8;
      --dim:   #475569;
      --red:   #E24B4A;
      --amber: #EF9F27;
      --blue:  #378ADD;
      --green: #22c55e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--navy);
      color: var(--slate);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .85rem 1.5rem;
      border-bottom: 1px solid rgba(34,211,238,.1);
      background: rgba(15,23,42,.95);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .hdr-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .hdr-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--slate);
    }
    .hdr-steps { display: flex; gap: 5px; align-items: center; }
    .step-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: background .3s;
    }
    .step-dot.active { background: var(--cyan); }
    .step-dot.done   { background: rgba(34,211,238,.4); }

    /* ── MAIN AREA ── */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      min-height: 0;
    }
    .screen {
      width: 100%;
      max-width: 520px;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCAN ANIMATION ── */
    .scan-eye-wrap {
      position: relative;
      width: 200px;
      height: 120px;
      margin: 0 auto 2rem;
    }
    .scan-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      animation: scanDown 1.8s ease-in-out infinite;
    }
    @keyframes scanDown {
      0%   { top: 0;    opacity: .8; }
      100% { top: 100%; opacity: 0; }
    }
    .scan-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid var(--cyan);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .scan-ring-1 { width: 230px; height: 138px; animation: ringPulse 2s ease-out infinite; }
    .scan-ring-2 { width: 270px; height: 162px; animation: ringPulse 2s ease-out infinite .5s; }
    @keyframes ringPulse {
      0%   { opacity: .3; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0;  transform: translate(-50%, -50%) scale(1.1); }
    }
    .scan-status {
      text-align: center;
      font-size: 12px;
      color: var(--cyan);
      letter-spacing: .08em;
      text-transform: uppercase;
      min-height: 18px;
      transition: opacity .25s;
    }

    /* ── DEVICE CARD ── */
    .device-card {
      background: var(--lift);
      border: 1px solid rgba(34,211,238,.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .device-icon-wrap {
      width: 68px; height: 68px;
      border-radius: 14px;
      background: rgba(34,211,238,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 30px;
      line-height: 1;
    }
    .device-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: .25rem;
    }
    .device-meta { font-size: 14px; color: var(--muted); margin-bottom: .85rem; }
    .patch-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .patch-warn {
      margin-top: .9rem;
      font-size: 12px;
      color: var(--muted);
      background: rgba(226,75,74,.07);
      border-radius: 8px;
      padding: .6rem .85rem;
      line-height: 1.55;
      text-align: left;
    }

    /* ── DEVICE CORRECTION ── */
    .dtype-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .dtype-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: .85rem .4rem;
      border-radius: 12px;
      background: var(--lcyan);
      color: var(--navy);
      border: 1.5px solid rgba(34,211,238,.35);
      cursor: pointer;
      transition: all .15s;
      font-size: 11px;
      font-weight: 600;
    }
    .dtype-card:hover { background: #c8f5fb; border-color: var(--cyan); }
    .dtype-card.sel   { background: var(--cyan); border-color: var(--cyan); }
    .dtype-card .di   { font-size: 22px; line-height: 1; }

    .ver-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-height: 340px;
      overflow-y: auto;
      margin-bottom: 1.25rem;
      padding-right: 2px;
    }
    .ver-card {
      padding: .7rem .9rem;
      border-radius: 10px;
      background: var(--lcyan);
      border: 1.5px solid rgba(34,211,238,.35);
      cursor: pointer;
      transition: all .15s;
      text-align: left;
    }
    .ver-card:hover { background: #c8f5fb; border-color: var(--cyan); }
    .ver-card.sel   { background: var(--cyan); border-color: var(--cyan); }
    .ver-label { font-size: 13px; font-weight: 600; color: var(--navy); display: block; margin-bottom: 1px; }
    .ver-note  { font-size: 10px; display: block; margin-bottom: 1px; }
    .ver-date  { font-size: 10px; color: #475569; display: block; font-style: italic; }
    .ver-card.sel .ver-note,
    .ver-card.sel .ver-date { color: rgba(15,23,42,.6); }

    /* ── PROFILE QUESTIONS ── */
    .q-progress {
      height: 3px;
      background: rgba(255,255,255,.08);
      border-radius: 99px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .q-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--cyan);
      transition: width .4s ease;
    }
    .q-block { margin-bottom: 1.75rem; }
    .q-label {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--slate);
      margin-bottom: .85rem;
      line-height: 1.35;
    }
    .q-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .q-pill {
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 99px;
      background: var(--lcyan);
      color: var(--navy);
      border: 1.5px solid rgba(34,211,238,.35);
      cursor: pointer;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .q-pill:hover { background: #c8f5fb; border-color: var(--cyan); }
    .q-pill.sel   { background: var(--cyan); border-color: var(--cyan); font-weight: 700; }
    .age-row { display: flex; align-items: center; gap: 12px; }
    .age-row input[type=range] { flex: 1; accent-color: var(--cyan); }
    .age-val {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--cyan);
      min-width: 36px;
      text-align: right;
    }
    .age-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--dim);
      margin-top: 4px;
    }

    /* ── CALCULATING ── */
    .calc-ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 2px solid rgba(34,211,238,.2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 0 auto 1.5rem;
    }
    .calc-ring::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      border-top-color: transparent;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS ── */
    .score-hero {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--lift);
      border-radius: 16px;
      padding: 1.4rem;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(255,255,255,.06);
    }
    .score-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 3px solid;
    }
    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
    }
    .score-of { font-size: 10px; opacity: .6; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .score-detail h2 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: .3rem; }
    .score-detail p  { font-size: 13px; color: var(--muted); line-height: 1.55; }

    .actor-list {
      background: var(--lift);
      border-radius: 12px;
      padding: 1rem;
      border: 1px solid rgba(255,255,255,.05);
      margin-bottom: 1.25rem;
    }
    .actor-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .45rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .actor-row:last-child { border-bottom: none; }
    .actor-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .actor-name { font-size: 13px; width: 160px; flex-shrink: 0; }
    .actor-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
    .actor-bar-fill { height: 100%; border-radius: 99px; transition: width .6s ease; }
    .actor-score { font-size: 13px; font-weight: 500; min-width: 28px; text-align: right; }

    .wins-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: .65rem;
    }
    .win-card {
      background: var(--lift);
      border-radius: 10px;
      padding: .85rem 1rem;
      margin-bottom: 7px;
      display: flex;
      gap: 10px;
      border: 1px solid rgba(255,255,255,.05);
    }
    .win-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(34,211,238,.15);
      color: var(--cyan);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .win-title  { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .win-where  { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 5px; }
    .win-chips  { display: flex; gap: 4px; flex-wrap: wrap; }
    .win-chip   { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }

    /* ── SAVE ── */
    .save-card {
      background: var(--lift);
      border: 1px solid rgba(34,211,238,.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .save-id-display {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: var(--cyan);
      background: rgba(34,211,238,.07);
      border: 1px solid rgba(34,211,238,.18);
      border-radius: 10px;
      padding: .85rem 1.25rem;
      margin: 1rem 0;
      word-break: break-word;
      letter-spacing: .03em;
      line-height: 1.7;
    }
    .pin-row { display: flex; gap: 8px; justify-content: center; margin: .65rem 0 1rem; }
    .pin-box {
      width: 44px; height: 52px;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.15);
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--slate);
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    .pin-box:focus { border-color: var(--cyan); }

    /* ── BUTTONS ── */
    .btn-primary {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 32px;
      border-radius: 99px;
      background: var(--lcyan);
      color: var(--navy);
      border: none;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      transition: background .15s, transform .15s;
    }
    .btn-primary:hover   { background: #c8f5fb; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .3; cursor: default; transform: none; }

    .btn-outline {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 24px;
      border-radius: 99px;
      background: #ffffff;
      color: var(--navy);
      border: 1.5px solid var(--cyan);
      cursor: pointer;
      outline: none;
      transition: background .15s, transform .15s;
    }
    .btn-outline:hover { background: var(--lcyan); transform: translateY(-1px); }

    .btn-ghost {
      font-size: 13px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 14px;
      outline: none;
      transition: color .15s;
    }
    .btn-ghost:hover { color: var(--slate); }

    .btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    /* ── UTILITIES ── */
    .eyebrow {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: .6rem;
    }
    .sec-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: .3rem;
    }
    .info-box {
      background: rgba(34,211,238,.05);
      border: 1px solid rgba(34,211,238,.14);
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      text-align: left;
      margin-bottom: 1.25rem;
    }
    .error-msg {
      background: rgba(226,75,74,.1);
      border: 1px solid rgba(226,75,74,.25);
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: 12px;
      color: var(--red);
      margin-top: .75rem;
      display: none;
    }

    /* scrollbar for version grid */
    .ver-grid::-webkit-scrollbar { width: 4px; }
    .ver-grid::-webkit-scrollbar-track { background: transparent; }
    .ver-grid::-webkit-scrollbar-thumb { background: rgba(34,211,238,.2); border-radius: 2px; }

    @media (max-width: 480px) {
      .dtype-grid { grid-template-columns: repeat(3, 1fr); }
      .ver-grid   { grid-template-columns: 1fr; }
      .actor-name { width: 120px; }
    }
  </style>
</head>

// ── SCORING ENGINE ────────────────────────────────────────
function calcScores() {
  const p  = PR;
  const d  = DV;
  const db = d.patch === 'current' ? 0 : d.patch === 'behind' ? 14 : 30;
  const ph = d.type === 'iphone' || d.type === 'android';
  const actors = [
    { nm:'Device thief',     g:'financial',
      t: Math.min(99, 38 + (ph?20:0) + p.usage*10 + p.home*6 + p.fin*8),
      s: Math.min(99, 40 + p.usage*10 + p.home*6) },
    { nm:'Cybercriminal',    g:'financial',
      t: Math.min(99, 65 + p.fin*10 + (4-p.tech)*7 + db + p.usage*6),
      s: Math.min(99, 58 + p.fin*8  + p.sm*6) },
    { nm:'Data broker',      g:'technical',
      t: Math.min(99, 42 + p.sm*10  + p.home*7 + p.usage*6),
      s: Math.min(99, 38 + p.sm*10  + (4-p.tech)*5) },
    { nm:'Insider threat',   g:'technical',
      t: Math.min(99, 40 + p.mdm*18 + p.role*12 + db),
      s: Math.min(99, 45 + p.mdm*14 + p.role*10) },
    { nm:'Nation-state/APT', g:'technical',
      t: Math.min(99, 30 + p.role*16 + p.pub*12 + p.usage*10 + db),
      s: Math.min(99, 28 + p.role*14 + p.pub*10) },
    { nm:'Partner abuser',   g:'social',
      t: Math.min(99, 30 + p.iso*18 + (ph?12:0)),
      s: Math.min(99, 42 + p.iso*18 + (4-p.tech)*8) },
    { nm:'Elder scammer',    g:'social',
      t: Math.min(99, 18 + (p.age>=65?42:p.age>=55?16:0) + (4-p.tech)*8),
      s: Math.min(99, 28 + (p.age>=65?46:p.age>=55?18:0) + p.iso*12 + (4-p.tech)*10) },
  ];
  actors.forEach(a => { a.co = Math.round((a.t + a.s) / 2); });
  actors.sort((a,b) => b.co - a.co);
  return actors;
}

function genId() {
  const words = ['ocean','violet','thunder','mercury','silver','falcon','ember',

                 'nexus','cobalt','amber','cipher','delta','echo','frost',
                 'glacier','horizon','indigo','jasper','kestrel','lantern'];
  const pick = () => words[Math.floor(Math.random() * words.length)];
  return `${pick()} · ${pick()} · ${pick()} · ${pick()}`;
}

// ── DEVICE DETECTION ─────────────────────────────────────
function detectDevice() {
  const ua = navigator.userAgent;
  const pl = navigator.platform || '';
  const tp = navigator.maxTouchPoints || 0;
  let type = 'windows', os = 'Windows', major = '11', icon = '🖥';

  if (/iPad/.test(ua) || (/Macintosh/.test(ua) && tp > 1)) {
    type = 'ipad'; os = 'iPadOS'; icon = '🟦';
    const m = ua.match(/CPU OS (\d+)/); if (m) major = m[1];
  } else if (/iPhone/.test(ua)) {
    type = 'iphone'; os = 'iOS'; icon = '📱';
    const m = ua.match(/CPU iPhone OS (\d+)/); if (m) major = m[1];
  } else if (/Android/.test(ua)) {
    type = 'android'; os = 'Android'; icon = '🤖';
    const m = ua.match(/Android (\d+)/); if (m) major = m[1];
  } else if (/Macintosh|MacIntel/.test(pl) && tp === 0) {
    type = 'mac'; os = 'macOS'; icon = '💻';
    const m = ua.match(/Mac OS X (\d+)/);
    if (m) major = m[1] === '10' ? '15' : m[1];
  }

  const CURR = { iphone:'26', ipad:'26', mac:'26', android:'15', windows:'11' };
  const cur  = CURR[type] || '11';
  const patch = parseInt(major) >= parseInt(cur) ? 'current'
              : parseInt(major) >= parseInt(cur) - 1 ? 'behind'
              : 'outdated';

  const NAMES = { iphone:'iPhone', ipad:'iPad', android:'Android phone', mac:'Mac', windows:'Windows PC' };
  return { type, os, major, icon, patch, name: NAMES[type] || 'Device' };
}

    <div class="screen" style="padding-bottom:2rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <p class="eyebrow" style="margin:0;">Your risk profile</p>
        <p style="font-size:11px;color:var(--muted);">${DV.name} · ${DV.os} ${DV.major}</p>
      </div>

      <div class="score-hero" role="region" aria-label="Overall risk score">
        <div class="score-ring" style="border-color:${rc}" aria-label="Risk score ${overall} out of 99">
          <span class="score-num" style="color:${rc}">${overall}</span>
          <span class="score-of">of 99</span>
        </div>
        <div>
          <h1 style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:.3rem;">${rl}</h1>
          <p style="font-size:13px;color:var(--muted);line-height:1.55;">${rd}</p>
        </div>
      </div>

      <p class="eyebrow" style="margin:.75rem 0 .5rem;">Threat actor scores</p>
      <div class="actor-list" role="list" aria-label="Threat actor scores ranked by interest in your profile">
        ${actorRows}
      </div>

      <p class="wins-title">Top quick wins — zero usage impact</p>
      ${winCards}

      <div class="btn-row" style="margin-top:1.5rem;">
        <button class="btn-primary" onclick="SID=genId();ST=6;render()">Save my results →</button>
        <button class="btn-ghost" onclick="window.location.href='/'">← Home</button>
      </div>
      <p style="text-align:center;margin-top:1rem;font-size:11px;color:var(--dim);">
        All calculations happen in your browser · Scores update as new CVEs are published
      </p>
    </div>`;
}

// ── STEP 6: SAVE ─────────────────────────────────────────
function renderSave() {
  if (!SID) SID = genId();
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="save-card">
        <h1 style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:.4rem;">
          Save your scan
        </h1>
        <p style="font-size:13px;color:var(--muted);line-height:1.6;">
          This is your private ID. Only you have this phrase — we cannot see it.
        </p>
        <div class="save-id-display" aria-label="Your private ID phrase">${SID}</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:.65rem;">Choose a 4-digit PIN:</p>
        <div class="pin-row" role="group" aria-label="4-digit PIN entry">
          <input class="pin-box" maxlength="1" type="password" inputmode="numeric"
                 aria-label="PIN digit 1" oninput="moveFocus(this,0)">
          <input class="pin-box" maxlength="1" type="password" inputmode="numeric"
                 aria-label="PIN digit 2" oninput="moveFocus(this,1)">
          <input class="pin-box" maxlength="1" type="password" inputmode="numeric"
                 aria-label="PIN digit 3" oninput="moveFocus(this,2)">
          <input class="pin-box" maxlength="1" type="password" inputmode="numeric"
                 aria-label="PIN digit 4" oninput="moveFocus(this,3)">
        </div>
        <div class="info-box">
          No recovery flow. If you lose your ID, start a fresh scan. We cannot access
          your data — and that's the point.
        </div>
        <div id="saveError" class="error-msg" role="alert">
          Something went wrong saving your scan. Please try again.
        </div>
        <button class="btn-primary" style="width:100%;" onclick="doSave()">
          Save and confirm →
        </button>
        <div style="margin-top:.65rem;">
          <button class="btn-ghost" style="font-size:12px;" onclick="ST=5;render()">
            Skip — view results without saving
          </button>
        </div>
      </div>
    </div>`;
}

function moveFocus(el, idx) {
  if (el.value.length === 1) {
    const boxes = [...document.querySelectorAll('.pin-box')];
    if (idx < 3) boxes[idx + 1].focus();
    else el.blur();
  }
}

// ── SAVE TO API ───────────────────────────────────────────
async function doSave() {
  const pin = [...document.querySelectorAll('.pin-box')].map(b => b.value).join('');
  if (pin.length < 4) {
    document.querySelector('.pin-box').focus();
    return;
  }

  const btn = document.querySelector('.save-card .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    const resp = await fetch(`${API}/api/scan/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        scan_id: SID,
        pin,
        device: {
          type:  DV.type,
          os:    DV.os,
          major: DV.major,
          patch: DV.patch,
        },
        profile: {
          age_range:        PR.age,
          financial_status: PR.fin,
          tech_skill:       PR.tech,
          social_isolation: PR.iso,
          social_media_use: PR.sm,
          job_data:         PR.role,
          public_profile:   PR.pub,
          mdm_level:        PR.mdm,
          home_environment: PR.home,
          usage_context:    PR.usage,
        },
      }),
    });

    if (!resp.ok) throw new Error(`API returned ${resp.status}`);

    // Success — show confirmation
    document.getElementById('app').innerHTML = `
      <div class="screen" style="text-align:center;">
        <div style="width:60px;height:60px;border-radius:50%;background:rgba(34,211,238,.12);border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none" aria-hidden="true">
            <path d="M5 13l6 6L21 7" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:.5rem;">Scan saved</h1>
        <p style="font-size:13px;color:var(--muted);max-width:300px;margin:0 auto 1.5rem;line-height:1.65;">
          Return with your ID and PIN anytime to track completed remediations and see new threats.
        </p>
        <div class="save-id-display" aria-label="Your private ID: ${SID}">${SID}</div>
        <p style="font-size:11px;color:var(--dim);margin-bottom:1.5rem;">
          Store this phrase somewhere safe — a password manager, a note, or a photo.
        </p>
        <button class="btn-primary" onclick="ST=5;render()">View my full results →</button>
      </div>`;

  } catch (err) {
    console.error('Save failed:', err);
    const errEl = document.getElementById('saveError');
    if (errEl) errEl.style.display = 'block';
    if (btn) { btn.disabled = false; btn.textContent = 'Save and confirm →'; }
  }
}

// ── ROUTER ────────────────────────────────────────────────
function render() {
  renderDots();
  CQ = ST === 3 ? 1 : 0;

  if      (ST === 0) renderScan();
  else if (ST === 1) renderDevice();
  else if (ST === 2) { CQ = 0; renderQuestions(); }
  else if (ST === 3) { CQ = 1; renderQuestions(); }
  else if (ST === 4) renderCalc();
  else if (ST === 5) renderResults();
  else if (ST === 6) renderSave();
}

// ── BOOT ─────────────────────────────────────────────────
render();
</script>

</body>
</html>
