<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Return to your MyBadGuy threat profile using your private ID and PIN.">
  <meta name="theme-color" content="#0f172a">
  <meta name="robots" content="noindex">
  <title>MyBadGuy — Return to your profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230f172a'/%3E%3Cpath d='M20,50 Q35,28 50,28 L50,72 Q35,72 20,50 Z' fill='%2322d3ee'/%3E%3Cpath d='M50,28 Q65,28 80,50 Q65,72 50,72 Z' fill='none' stroke='%23f1f5f9' stroke-width='2.5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23f1f5f9'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%2322d3ee'/%3E%3C/svg%3E">
</head>
<body>

<nav class="nav" role="navigation" aria-label="Main navigation">
  <a href="/" class="nav-brand">
    <svg width="26" height="16" viewBox="0 0 100 60" aria-hidden="true">
      <path d="M3,30 Q22,4 50,4 L50,56 Q22,56 3,30 Z" fill="#22d3ee"/>
      <path d="M50,4 Q78,4 97,30 Q78,56 50,56 Z" fill="none" stroke="#f1f5f9" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="50" cy="30" r="7" fill="#f1f5f9"/>
      <circle cx="50" cy="30" r="2.5" fill="#22d3ee"/>
    </svg>
    <span class="nav-name">MyBadGuy</span>
  </a>
  <a href="/" class="btn-back">← Home</a>
</nav>

<main class="page" id="main">
  <div class="card">
    <p class="card-eyebrow">Welcome back</p>
    <h1 class="card-title">Return to your profile</h1>
    <p class="card-sub">Enter your private ID phrase and PIN to pick up where you left off.</p>

    <label class="field-label" for="scanId">Your private ID</label>
    <input class="id-input" id="scanId" type="text"
           placeholder="frost prism cobalt silver"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
           aria-label="Private ID phrase">

    <label class="field-label" for="pin1">Your PIN</label>
    <div class="pin-row" role="group" aria-label="4-digit PIN">
      <input class="pin-box" id="pin1" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*" aria-label="PIN digit 1" data-idx="0">
      <input class="pin-box" id="pin2" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*" aria-label="PIN digit 2" data-idx="1">
      <input class="pin-box" id="pin3" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*" aria-label="PIN digit 2" data-idx="2">
      <input class="pin-box" id="pin4" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]*" aria-label="PIN digit 4" data-idx="3">
    </div>

    <button class="btn-primary" id="returnBtn" disabled>View my profile →</button>

    <div class="status-msg" id="statusMsg" role="alert"></div>
    <div class="threats-banner" id="threatsBanner"></div>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <a href="detect.html" class="fresh-link">Run a new detection →</a>
  </div>
</main>

<footer class="footer" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-brand">
      <svg width="22" height="13" viewBox="0 0 100 60" aria-hidden="true">
        <path d="M3,30 Q22,4 50,4 L50,56 Q22,56 3,30 Z" fill="#22d3ee"/>
        <path d="M50,4 Q78,4 97,30 Q78,56 50,56 Z" fill="none" stroke="#475569" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="50" cy="30" r="7" fill="#475569"/>
        <circle cx="50" cy="30" r="2.5" fill="#22d3ee"/>
      </svg>
      <span class="footer-wordmark">MyBadGuy</span>
    </div>
    <nav class="footer-links" aria-label="Footer navigation">
      <a href="/"             class="footer-link">Home</a>
      <a href="/about.html"   class="footer-link">About</a>
      <a href="/privacy.html" class="footer-link">Privacy policy</a>
      <a href="mailto:support@mybadguy.com" class="footer-link">Contact</a>
    </nav>
  </div>
</footer>
<p class="nvd-attr">This product uses data from the NVD API but is not endorsed or certified by the NVD.</p>

<script src="/js/return.js"></script>
</body>
</html>
