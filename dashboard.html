<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Your personal threat actor risk dashboard — MyBadGuy">
  <meta name="theme-color" content="#003F72">
  <title>MyBadGuy — Risk Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/optiona.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23003F72'/%3E%3Cpath d='M20,50 Q35,28 50,28 L50,72 Q35,72 20,50 Z' fill='%2322d3ee'/%3E%3Cpath d='M50,28 Q65,28 80,50 Q65,72 50,72 Z' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23fff'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%2322d3ee'/%3E%3C/svg%3E">
  <style>
    /* ── Dashboard-specific styles ── */
    body { background: #fff; color: #1a1a1a; font-size: 17px; }

    /* NAV */
    .nav { background: #003F72; padding: 0 20px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn-back { font-size: 14px; color: rgba(255,255,255,.8); background: none; border: none; cursor: pointer; padding: 7px 14px; border-radius: 99px; text-decoration: none; }
    .btn-back:hover { color: #fff; text-decoration: none; }
    .btn-rescan { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; padding: 8px 20px; border-radius: 99px; background: #fff; color: #003F72; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-rescan:hover { background: #e8f0f8; text-decoration: none; }

    /* PAGE */
    .page { max-width: 760px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
    .eyebrow { font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #003F72; margin-bottom: .4rem; }

    /* SCORE HERO */
    .score-hero { background: #F0F4F8; border: 1px solid #dde3ea; border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 1.5rem; }
    .score-ring { width: 96px; height: 96px; border-radius: 50%; border: 4px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
    .score-num { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 700; line-height: 1; }
    .score-of { font-size: 11px; opacity: .6; text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .sec-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: .3rem; }

    /* PROFILE CARD */
    .profile-card { background: #F0F4F8; border: 1px solid #dde3ea; border-radius: 14px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .profile-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; }
    .update-pill { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 99px; background: #003F72; color: #fff; text-decoration: none; display: inline-block; }
    .update-pill:hover { background: #00306b; text-decoration: none; }
    .dev-summary { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #dde3ea; }
    .dev-name-badge { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .dev-ver-badge { font-size: 13px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
    .dev-patch-badge { font-size: 13px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
    .ro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
    .ro-section { font-size: 12px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: #666; grid-column: 1/-1; margin: 0 0 6px; padding-top: .65rem; }
    .ro-section:first-child { padding-top: 0; }
    .ro-row { display: flex; align-items: baseline; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #dde3ea; gap: 8px; }
    .ro-row:last-of-type { border-bottom: none; }
    .ro-label { font-size: 14px; color: #555; flex-shrink: 0; }
    .ro-val { font-size: 14px; font-weight: 600; color: #1a1a1a; text-align: right; }
    .profile-divider { height: 1px; background: #dde3ea; margin: .5rem 0; }

    /* ACTOR GROUPS */
    .group-block { margin-bottom: 1.5rem; }
    .group-hdr { display: flex; align-items: center; gap: 10px; padding: .6rem 1rem; border-radius: 8px; border-left: 4px solid; margin-bottom: .75rem; background: #F0F4F8; }
    .group-hdr-label { font-size: 15px; font-weight: 600; color: #1a1a1a; flex: 1; }
    .group-hdr-avg { font-size: 13px; color: #666; }

    /* ACTOR CARDS */
    .actor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 4px; }
    .actor-card { display: block; background: #fff; border: 1.5px solid #dde3ea; border-radius: 14px; padding: 1.1rem; text-decoration: none; transition: border-color .15s, transform .15s; cursor: pointer; }
    .actor-card:hover { border-color: #003F72; transform: translateY(-2px); text-decoration: none; }
    .actor-score { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; line-height: 1; }
    .actor-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .actor-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-top: .35rem; }
    .actor-sub { font-size: 13px; color: #666; margin-top: 2px; }

    /* SCORE CHIPS on actor cards */
    .score-chip { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-right: 3px; margin-top: 4px; }

    /* COMBINED RISK DETAILS button */
    .report-cta-wrap { text-align: center; margin: 1.5rem 0; }

    /* NVD ATTRIBUTION */
    .attribution { text-align: center; font-size: 12px; color: #888; padding: .75rem; border-top: 1px solid #dde3ea; margin-top: 1.5rem; }

    @media (max-width: 580px) {
      .ro-grid { grid-template-columns: 1fr; }
      .score-hero { flex-direction: column; text-align: center; }
      .actor-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>

<nav class="nav" role="navigation" aria-label="Main navigation">
  <a href="/" class="nav-brand" aria-label="MyBadGuy home">

      <circle cx="50" cy="30" r="7" fill="#fff"/>
      <circle cx="50" cy="30" r="2.5" fill="#22d3ee"/>

    <a href="detect.html" class="btn-back">← Back</a>
    <a href="detect.html" class="btn-rescan">New detection →</a>
  </div>
</nav>

<div class="page" id="page"></div>

<script src="/js/save.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
